<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Hourly Sync Monitoring</title>
    <style>
        /* Base Styles & Reset */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #eef2f7;
            color: #333;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar Styles */
        .sidebar {
            width: 320px;
            background-color: #ffffff;
            padding: 25px;
            display: flex;
            flex-direction: column;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
            z-index: 10;
        }

        .sidebar h2 {
            text-align: center;
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 30px;
            font-weight: 700;
        }

        .btn {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background-color 0.3s ease;
            width: 100%;
            margin-bottom: 20px;
        }

        .btn:hover { background-color: #2980b9; }
        
        .btn-export { background-color: #2ecc71; }
        .btn-export:hover { background-color: #27ae60; }

        .file-list {
            flex-grow: 1;
            background-color: #f8f9fa;
            border: 1px solid #e0e6ed;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            overflow-y: auto;
            font-family: monospace;
            font-size: 14px;
            color: #555;
        }

        .status-badge {
            background-color: #e74c3c;
            color: white;
            text-align: center;
            padding: 10px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }

        /* Main Content Styles */
        .main-content {
            flex-grow: 1;
            padding: 30px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow-y: auto;
        }

        /* Header Controls Area */
        .controls-card {
            background-color: #ffffff;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 15px;
        }

        .control-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        select {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #d1d8e0;
            outline: none;
            background-color: #f8f9fa;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            font-weight: 500;
        }

        /* Log Section Styles */
        .log-section {
            background-color: #ffffff;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.03);
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding: 20px;
        }

        .log-section h3 {
            margin-bottom: 15px;
            color: #2c3e50;
        }

        .log-box {
            background-color: #1e272e;
            color: #0be881;
            flex-grow: 1;
            border-radius: 10px;
            padding: 15px;
            font-family: 'Courier New', Courier, monospace;
            overflow-y: auto;
            border: none;
            resize: none;
            width: 100%;
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SYNC DASHBOARD</h2>
        
        <input type="file" id="file-upload" multiple accept=".xlsx" style="display: none;">
        <button class="btn" onclick="document.getElementById('file-upload').click()">Upload Reports</button>
        
        <div class="file-list">
            Waiting for files...
        </div>

        <div class="status-badge">No Files</div>
    </div>

    <div class="main-content">
        
        <div class="controls-card">
            <div class="control-group">
                <label>Panchayat Column:</label>
                <select id="panchayat-select">
                    <option>Select column...</option>
                </select>
            </div>

            <div class="control-group">
                <label>DateTime Column:</label>
                <select id="datetime-select">
                    <option>Select column...</option>
                </select>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="highlight" checked>
                <label for="highlight">Highlight Newly Synced</label>
            </div>

            <div class="control-group">
                <button class="btn" id="btn-process" style="margin: 0; width: auto;">Process</button>
                <button class="btn btn-export" id="btn-export" style="margin: 0; width: auto;">Export</button>
            </div>
        </div>

        <div class="log-section">
            <h3>Processing Log</h3>
            <textarea class="log-box" readonly>System initialized. Ready to process files...</textarea>
        </div>

    </div>

    <script>
        const fileInput = document.getElementById('file-upload');
        const fileListDiv = document.querySelector('.file-list');
        const statusBadge = document.querySelector('.status-badge');
        const panchayatSelect = document.getElementById('panchayat-select');
        const datetimeSelect = document.getElementById('datetime-select');
        const processBtn = document.getElementById('btn-process');
        const exportBtn = document.getElementById('btn-export');
        const logBox = document.querySelector('.log-box');

        let uploadedFiles = [];

        // Helper function to write to our hacker-style terminal
        function log(message) {
            const time = new Date().toLocaleTimeString();
            logBox.value += `\n[${time}] ${message}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 1. Handle File Upload & Fetch Columns
        fileInput.addEventListener('change', async (e) => {
            uploadedFiles = Array.from(e.target.files);
            
            if (uploadedFiles.length === 0) return;

            // Update UI
            fileListDiv.innerHTML = uploadedFiles.map(f => f.name).join('<br>');
            statusBadge.textContent = `${uploadedFiles.length} Files Loaded`;
            statusBadge.style.backgroundColor = '#2ecc71';
            log(`Loaded ${uploadedFiles.length} files. Fetching column headers from server...`);

            // Send just the first file to the server to get headers
            const formData = new FormData();
            formData.append('files', uploadedFiles[0]); 

            try {
                const response = await fetch('/api/get_columns', {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.error) {
                    log(`Error: ${data.error}`);
                    return;
                }

                // Populate Dropdowns
                panchayatSelect.innerHTML = '';
                datetimeSelect.innerHTML = '';
                
                data.columns.forEach(col => {
                    panchayatSelect.add(new Option(col, col));
                    datetimeSelect.add(new Option(col, col));
                });
                
                log('Columns successfully loaded. Select your targets and click Export.');

            } catch (err) {
                log(`Failed to connect to server: ${err.message}`);
            }
        });

        // 2. Handle Processing & Exporting
        exportBtn.addEventListener('click', async () => {
            if (uploadedFiles.length === 0) {
                alert('Please upload files first!');
                return;
            }

            log('Sending data to server for processing...');
            exportBtn.textContent = "Processing...";
            exportBtn.style.opacity = "0.7";
            exportBtn.disabled = true;

            const formData = new FormData();
            uploadedFiles.forEach(file => formData.append('files', file));
            formData.append('p_col', panchayatSelect.value);
            formData.append('dt_col', datetimeSelect.value);

            try {
                const response = await fetch('/api/process', {
                    method: 'POST',
                    body: formData
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Server processing error');
                }

                log('Processing complete! Downloading report...');

                // Handle the file download trick in the browser
                const blob = await response.blob();
                const downloadUrl = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = downloadUrl;
                
                // Grab the filename the backend generated
                const disposition = response.headers.get('Content-Disposition');
                let filename = 'Pro_Sync_Report.xlsx';
                if (disposition && disposition.includes('attachment')) {
                    const filenameRegex = /filename[^;=\n]*=((['"]).*?\2|[^;\n]*)/;
                    const matches = filenameRegex.exec(disposition);
                    if (matches != null && matches[1]) {
                        filename = matches[1].replace(/['"]/g, '');
                    }
                }

                a.download = filename;
                document.body.appendChild(a);
                a.click();
                a.remove();
                window.URL.revokeObjectURL(downloadUrl);
                
                log('Export successful! Check your downloads folder.');

            } catch (err) {
                log(`Error during processing: ${err.message}`);
            } finally {
                // Reset button state
                exportBtn.textContent = "Export";
                exportBtn.style.opacity = "1";
                exportBtn.disabled = false;
            }
        });

        // Let the user know processing and exporting are unified in the web app
        processBtn.addEventListener('click', () => {
            log('Note: In the web version, processing and exporting are combined. Just click "Export" to generate the final workbook.');
        });
    </script>
</body>
</html>
