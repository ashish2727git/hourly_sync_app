<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SYNC MONITOR || PRO EDITION</title>
    <style>
        :root {
            --bg-main: #0f172a; --card-bg: #1e293b; --accent-blue: #38bdf8;
            --accent-green: #22c55e; --border-color: #334155; --text-light: #cbd5e1; --text-muted: #64748b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }

        body { background-color: var(--bg-main); color: var(--text-light); display: flex; height: 100vh; overflow: hidden; }

        /* Sidebar */
        .sidebar { width: 350px; background-color: var(--card-bg); padding: 30px 20px; display: flex; flex-direction: column; border-right: 1px solid var(--border-color); }
        .brand-title { color: var(--accent-blue); font-size: 24px; font-weight: 800; text-align: center; letter-spacing: 2px;}
        .brand-subtitle { color: var(--text-muted); text-align: center; margin-bottom: 30px; font-size: 14px; letter-spacing: 4px;}

        .btn { background-color: #334155; color: white; border: none; padding: 15px; border-radius: 10px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: 15px; transition: 0.2s; }
        .btn:hover { background-color: #475569; }
        .btn-danger { background-color: #7f1d1d; }
        .btn-danger:hover { background-color: #991b1b; }
        
        .file-list { flex-grow: 1; background-color: var(--bg-main); border: 1px solid var(--border-color); border-radius: 12px; padding: 10px; margin-top: 10px; overflow-y: auto; }
        
        /* Individual File Row */
        .file-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; border-bottom: 1px solid var(--border-color); }
        .file-name { font-family: monospace; font-size: 12px; color: var(--text-light); word-break: break-all; }
        .btn-delete-file { background: transparent; border: none; color: #ef4444; cursor: pointer; font-size: 14px; padding: 0 5px; }
        .btn-delete-file:hover { color: #f87171; }

        .status-pill { background-color: #064e3b; color: #4ade80; text-align: center; padding: 10px; border-radius: 20px; font-weight: bold; margin-top: 20px; }

        /* Main Content */
        .main-content { flex-grow: 1; padding: 30px; display: flex; flex-direction: column; gap: 20px; overflow-y: auto; }
        .card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 15px; padding: 20px; }
        .card-title { color: var(--accent-blue); font-size: 14px; font-weight: 700; margin-bottom: 15px;}
        .mapping-grid { display: flex; gap: 20px; }
        .input-group { display: flex; flex-direction: column; gap: 8px; flex: 1;}
        select { padding: 12px; border-radius: 8px; border: 1px solid var(--border-color); background-color: var(--bg-main); color: white; outline: none; }
        .field-selector { display: flex; gap: 15px; overflow-x: auto; padding-bottom: 10px; white-space: nowrap; }
        .checkbox-wrapper { display: flex; align-items: center; gap: 8px; color: #94a3b8; font-size: 13px;}

        /* Terminals and Action Buttons */
        .log-section { flex-grow: 1; display: flex; flex-direction: column; }
        .log-box { background-color: #020617; color: var(--accent-green); flex-grow: 1; border-radius: 10px; padding: 15px; font-family: monospace; border: none; resize: none; width: 100%; outline: none; }
        .bottom-actions { display: flex; gap: 20px; margin-top: 10px; }
        .btn-process { background-color: #0369a1; height: 55px; font-size: 16px; flex: 1;}
        .btn-export { background-color: #047857; height: 55px; font-size: 16px; flex: 1;}
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="brand-title">COMMAND</div>
        <div class="brand-subtitle">CENTER</div>
        
        <input type="file" id="file-upload" multiple accept=".xlsx" style="display: none;">
        <button class="btn" onclick="document.getElementById('file-upload').click()">📁 UPLOAD FILES</button>
        <button class="btn btn-danger" onclick="clearAllFiles()">🗑️ CLEAR ALL</button>
        
        <div class="card-title" style="margin-top: 20px; margin-bottom: 5px;">FILE PIPELINE</div>
        <div class="file-list" id="file-list-container">
            <span style="color: var(--text-muted); font-size: 12px; padding: 10px;">Waiting for pipeline input...</span>
        </div>

        <div class="status-pill">SYSTEM READY</div>
    </div>

    <div class="main-content">
        <div class="card">
            <div class="card-title">MAPPING SETTINGS</div>
            <div class="mapping-grid">
                <div class="input-group">
                    <label style="color: var(--text-muted); font-size: 12px;">Primary Key</label>
                    <select id="panchayat-select"><option>Await data...</option></select>
                </div>
                <div class="input-group">
                    <label style="color: var(--text-muted); font-size: 12px;">Timestamp</label>
                    <select id="datetime-select"><option>Await data...</option></select>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">FIELD SELECTOR (EXTRA COLUMNS)</div>
            <div class="field-selector" id="field-container">
                <span style="color: var(--text-muted); font-size: 13px;">Upload files to select extra fields...</span>
            </div>
        </div>

        <div class="card log-section">
            <div class="card-title">LIVE PROCESSING STREAM</div>
            <textarea class="log-box" readonly>[SYSTEM] Awaiting initialization...</textarea>
        </div>

        <div class="bottom-actions">
            <button class="btn btn-process" id="btn-process">🚀 INITIALIZE ENGINE</button>
            <button class="btn btn-export" id="btn-export">📊 DOWNLOAD ANALYTICS</button>
        </div>
    </div>

    <script>
        let uploadedFiles = [];
        
        const fileInput = document.getElementById('file-upload');
        const fileListContainer = document.getElementById('file-list-container');
        const statusPill = document.querySelector('.status-pill');
        const logBox = document.querySelector('.log-box');

        function log(message) {
            logBox.value += `\n${message}`;
            logBox.scrollTop = logBox.scrollHeight;
        }

        // --- UI Updates ---
        function renderFileList() {
            if (uploadedFiles.length === 0) {
                fileListContainer.innerHTML = '<span style="color: var(--text-muted); font-size: 12px; padding: 10px;">Waiting for pipeline input...</span>';
                document.getElementById('panchayat-select').innerHTML = '<option>Await data...</option>';
                document.getElementById('datetime-select').innerHTML = '<option>Await data...</option>';
                document.getElementById('field-container').innerHTML = '';
                return;
            }

            fileListContainer.innerHTML = '';
            uploadedFiles.forEach((f, i) => {
                const row = document.createElement('div');
                row.className = 'file-row';
                row.innerHTML = `
                    <span class="file-name">${(i+1).toString().padStart(2, '0')} | ${f.name}</span>
                    <button class="btn-delete-file" onclick="removeFile(${i})">❌</button>
                `;
                fileListContainer.appendChild(row);
            });
        }

        function removeFile(index) {
            log(`[!] Removed file: ${uploadedFiles[index].name}`);
            uploadedFiles.splice(index, 1);
            renderFileList();
            if(uploadedFiles.length > 0) fetchHeaders(); // Re-fetch based on new first file
        }

        function clearAllFiles() {
            uploadedFiles = [];
            renderFileList();
            log("[!] Pipeline cleared.");
        }

        // --- Server Communication ---
        fileInput.addEventListener('change', (e) => {
            const newFiles = Array.from(e.target.files);
            uploadedFiles = uploadedFiles.concat(newFiles);
            renderFileList();
            log(`[+] Pipeline updated. Loaded ${newFiles.length} new items.`);
            fetchHeaders();
            fileInput.value = ""; // Reset input
        });

        async function fetchHeaders() {
            if(uploadedFiles.length === 0) return;
            const formData = new FormData();
            formData.append('files', uploadedFiles[0]); 

            try {
                const response = await fetch('/api/get_columns', { method: 'POST', body: formData });
                const data = await response.json();
                if (data.error) throw new Error(data.error);

                const pSelect = document.getElementById('panchayat-select');
                const dtSelect = document.getElementById('datetime-select');
                const fieldContainer = document.getElementById('field-container');
                
                pSelect.innerHTML = ''; dtSelect.innerHTML = ''; fieldContainer.innerHTML = '';
                
                data.columns.forEach((col, i) => {
                    pSelect.add(new Option(col, col));
                    dtSelect.add(new Option(col, col));
                    fieldContainer.innerHTML += `<div class="checkbox-wrapper"><input type="checkbox" id="chk_${i}" value="${col}"> <label for="chk_${i}">${col}</label></div>`;
                });
                
                if (data.columns.length > 1) dtSelect.selectedIndex = 1;
                log('[SYSTEM] Metadata loaded. Configure fields and hit Download.');
            } catch (err) { log(`[x] Connection error: ${err.message}`); }
        }

        const executePipeline = async () => {
            if (uploadedFiles.length === 0) { alert('Input pipeline empty.'); return; }

            log('[SYSTEM] Core initialization sequence started...');
            const formData = new FormData();
            uploadedFiles.forEach(f => formData.append('files', f));
            formData.append('p_col', document.getElementById('panchayat-select').value);
            formData.append('dt_col', document.getElementById('datetime-select').value);

            const extraCols = [];
            document.querySelectorAll('.field-selector input[type="checkbox"]:checked').forEach(chk => extraCols.push(chk.value));
            formData.append('extra_cols', JSON.stringify(extraCols));

            try {
                const response = await fetch('/api/process', { method: 'POST', body: formData });
                if (!response.ok) throw new Error('Server exception during processing.');

                const blob = await response.blob();
                const a = document.createElement('a');
                a.href = window.URL.createObjectURL(blob);
                a.download = 'SYNC_ANALYTICS.xlsx';
                document.body.appendChild(a);
                a.click(); a.remove();
                
                log('[+] Analytics matrix compiled successfully.');
            } catch (err) { log(`[x] Error: ${err.message}`); }
        };

        document.getElementById('btn-export').addEventListener('click', executePipeline);
        document.getElementById('btn-process').addEventListener('click', executePipeline);
    </script>
</body>
</html>
